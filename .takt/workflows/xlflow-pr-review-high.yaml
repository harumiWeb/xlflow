name: xlflow-pr-review-high
description: GPT-5.4 review triage/auditor + DeepSeek V4 Pro fixer workflow for addressing PR review feedback

workflow_config:
  provider_options:
    codex:
      network_access: true

    opencode:
      network_access: true

max_steps: 20
initial_step: review_intake

steps:
  # =========================================================
  # REVIEW INTAKE
  # =========================================================
  - name: review_intake

    edit: false

    provider: codex
    model: gpt-5.4
    required_permission_mode: full

    provider_options:
      codex:
        reasoning_effort: high

    persona: planner

    knowledge:
      - architecture
      - coding-rules
      - invariants
      - maintainability

    instruction: |
      Analyze the PR review feedback before changing code.

      Produce:
      - actionable comment list
      - non-actionable or already-resolved comments
      - affected files and call chains
      - expected behavior and compatibility constraints
      - required tests, docs, and spec updates
      - risks if the feedback is implemented incorrectly

      For each actionable comment, identify:
      - the concrete defect or concern
      - whether code, tests, docs, or only reviewer response is needed
      - whether the comment conflicts with existing xlflow contracts

      Important:
      - do not blindly accept incorrect review feedback
      - preserve public APIs and workbook compatibility unless the review explicitly requires change
      - check durable docs/spec needs for user-visible or contract-visible changes

    rules:
      - condition: 指摘が明確で対応方針を確定できる
        next: fix_plan

      - condition: 実装変更が不要で説明のみで十分
        next: final_audit

      - condition: 指摘がすべて解消済みまたは非対応で妥当
        next: COMPLETE

      - condition: 指摘内容が不明確、または追加コンテキストが必要
        next: ABORT
        appendix: |
          確認事項:
          - {不足しているレビューコメントまたは差分}
          - {必要な背景情報}

    output_contracts:
      report:
        - name: review-intake.md
          format: plan

  # =========================================================
  # FIX PLAN
  # =========================================================
  - name: fix_plan

    edit: false

    provider: codex
    model: gpt-5.4
    required_permission_mode: full

    provider_options:
      codex:
        reasoning_effort: medium

    persona: planner

    knowledge:
      - architecture
      - coding-rules
      - invariants

    instruction: |
      Turn the accepted review feedback into an implementation plan.

      Produce:
      - exact files to edit
      - per-comment fix strategy
      - required regression tests
      - required docs/spec/changelog updates
      - verification commands
      - rollback or re-plan triggers

      Plan standards:
      - keep scope minimal
      - prefer existing package boundaries and helper patterns
      - separate code fixes from reviewer-response-only items
      - call out any feedback that should be answered rather than implemented

    rules:
      - condition: 計画が確定した
        next: implementation

      - condition: 設計上の不一致がありユーザー判断が必要
        next: fix_plan
        requires_user_input: true
        interactive_only: true

      - condition: 計画を確定できない
        next: ABORT

    output_contracts:
      report:
        - name: fix-plan.md
          format: plan

  # =========================================================
  # IMPLEMENTATION
  # =========================================================
  - name: implementation

    edit: true

    provider: opencode
    model: opencode-go/deepseek-v4-pro

    persona: implementer

    policy:
      - coding
      - testing

    knowledge:
      - architecture
      - coding-rules
      - invariants

    required_permission_mode: edit

    instruction: |
      Implement the approved review-feedback fixes exactly as planned.

      Requirements:
      - address each accepted review comment completely
      - if re-entered from self_review or audit_triage, address only the remaining actionable findings
      - keep edits tightly scoped
      - add or update regression tests where the review exposes a bug or contract gap
      - update docs/specs/changelog when the change is user-visible or contract-visible
      - do not invent edits for allowed untracked files, auto-staging observations, or release-gate-only findings

      Avoid:
      - unrelated refactors
      - speculative cleanup
      - silent behavior changes outside the reviewed scope

      After implementation:
      - run the planned or newly required targeted verification commands
      - fix any failures caused by the changes
      - keep the patch unchanged when no actionable code/doc/test change remains

    rules:
      - condition: 実装が完了した
        next: verification

      - condition: 再計画が必要
        next: fix_plan

      - condition: 実装を継続できない
        next: ABORT

      - condition: ユーザー入力が必要
        next: implementation
        requires_user_input: true
        interactive_only: true

    output_contracts:
      report:
        - name: implementation-report.md
          format: implementation-report

  # =========================================================
  # VERIFICATION
  # =========================================================
  - name: verification

    edit: false

    provider: opencode
    model: opencode-go/deepseek-v4-pro

    persona: tester

    policy:
      - testing

    knowledge:
      - unit-testing
      - e2e-testing
      - coding-rules
      - invariants

    required_permission_mode: full

    instruction: |
      Verify that the implemented fixes actually resolve the review feedback.

      Validate:
      - each addressed comment has evidence in code or tests
      - targeted regression tests pass
      - docs/spec updates match the new behavior
      - no unrelated failures or contract regressions were introduced

      Prefer:
      - targeted verification first
      - broader regression coverage when shared behavior changed
      - explicit note of anything still unverified

    rules:
      - condition: 検証が通過した
        next: self_review

      - condition: 実装修正が必要
        next: implementation

      - condition: 検証を継続できない
        next: ABORT

    output_contracts:
      report:
        - name: verification-report.md
          format: test-report

  # =========================================================
  # SELF REVIEW
  # =========================================================
  - name: self_review

    edit: false

    provider: opencode
    model: opencode-go/deepseek-v4-pro

    persona: reviewer

    knowledge:
      - architecture
      - coding-rules
      - invariants
      - security

    instruction: |
      Review the resulting diff against the original PR feedback.

      Find:
      - unresolved review comments
      - partial fixes
      - missing tests or missing docs/spec updates
      - regressions introduced while addressing comments
      - over-scoped changes unrelated to the feedback

      Validate:
      - the patch still matches the accepted feedback or audit triage
      - intentional new files within scope are acceptable even if currently untracked
      - auto-staging or transient git state is not treated as a blocker by itself

      Be strict about whether the resulting patch would satisfy a demanding reviewer.

    rules:
      - condition: 修正が必要
        next: implementation

      - condition: 品質が十分
        next: final_audit

      - condition: レビュー継続不可
        next: ABORT

    output_contracts:
      report:
        - name: self-review.md
          format: review-report

  # =========================================================
  # AUDIT TRIAGE
  # =========================================================
  - name: audit_triage

    edit: false

    provider: codex
    model: gpt-5.4
    required_permission_mode: full

    provider_options:
      codex:
        reasoning_effort: medium

    persona: planner

    knowledge:
      - architecture
      - coding-rules
      - invariants
      - maintainability

    instruction: |
      Turn final_audit feedback into the smallest safe next action.

      Separate findings into:
      - actionable code/docs/tests changes
      - manual or Windows + Excel release-gate and E2E verification
      - non-blocking, reviewer-response-only, or already-fixed notes that should not reopen implementation

      Requirements:
      - send work back to implementation only when concrete file edits remain
      - route pure release-gate or environment-proof items to release_gate
      - do not reopen implementation for allowed untracked files, auto-staging concerns, or stale already-fixed findings
      - if the findings imply the accepted review plan is wrong or incomplete, re-plan instead of churning

      Produce:
      - exact files or commands
      - verification evidence needed
      - any user or environment dependency

    rules:
      - condition: コード/ドキュメント/テスト修正計画が確定した
        next: implementation

      - condition: 手動E2Eまたはリリースゲート確認が必要
        next: release_gate

      - condition: レビュー方針の再整理が必要
        next: fix_plan

      - condition: 監査所見の整理により再監査で足りる
        next: final_audit

      - condition: ユーザー判断が必要
        next: audit_triage
        requires_user_input: true
        interactive_only: true

      - condition: 判断を継続できない
        next: ABORT

    output_contracts:
      report:
        - name: audit-triage.md
          format: plan

  # =========================================================
  # RELEASE GATE
  # =========================================================
  - name: release_gate

    edit: false

    provider: codex
    model: gpt-5.4
    required_permission_mode: full

    provider_options:
      codex:
        reasoning_effort: medium

    persona: tester

    policy:
      - testing

    knowledge:
      - e2e-testing
      - architecture
      - coding-rules
      - invariants

    instruction: |
      Resolve remaining manual or environment-bound audit blockers without reopening broad implementation by default.

      Focus on:
      - Windows + Excel COM E2E and other release-gate proof
      - docs or contract evidence that does not require new code edits
      - clearly separating verified blockers from environment limitations

      Requirements:
      - run the narrowest release-gate checks that answer the remaining blocker
      - if the gate exposes a concrete defect, hand it back through audit_triage with the exact failure
      - if the gate is blocked by environment or human-only work, stop cleanly with explicit handoff instead of looping
      - do not treat allowed untracked files or auto-staging state as gate failures

    rules:
      - condition: 検証が完了し再監査に進める
        next: final_audit

      - condition: 実装修正が必要と判明した
        next: audit_triage

      - condition: レビュー方針の再整理が必要
        next: fix_plan

      - condition: ユーザーまたは別環境での確認が必要
        next: ABORT
        appendix: |
          release_gate handoff:
          - remaining gate: {残件}
          - recommended command or environment: {推奨手順}
          - blocking reason: {阻害要因}

      - condition: 検証を継続できない
        next: ABORT

    output_contracts:
      report:
        - name: release-gate-report.md
          format: test-report

  # =========================================================
  # FINAL AUDIT
  # =========================================================
  - name: final_audit

    edit: false

    provider: codex
    model: gpt-5.4
    required_permission_mode: full

    provider_options:
      codex:
        reasoning_effort: medium

    persona: architect

    knowledge:
      - architecture
      - coding-rules
      - invariants
      - maintainability
      - security

    instruction: |
      Perform a final audit of the PR review response.

      Validate:
      - accepted comments are fully addressed
      - rejected comments are rejected for defensible reasons
      - tests and documentation are sufficient for the change
      - no contract drift or hidden compatibility break was introduced
      - the resulting patch is concise and reviewable
      - actionable code/docs/tests blockers are separated from manual release-gate blockers
      - report verdicts are internally consistent with the findings they cite

      Include:
      - residual risks
      - unverified items
      - reviewer-facing summary of what changed

      Check carefully for:
      - stale findings that are already fixed
      - workflow-policy mismatches such as allowed untracked files or auto-staging being reported as blockers

      Prefer:
      - approval when only non-blocking notes remain

    rules:
      - condition: 承認
        next: COMPLETE

      - condition: コード/ドキュメント/テスト修正が必要
        next: audit_triage

      - condition: 手動E2Eまたはリリースゲート確認が必要
        next: release_gate

      - condition: 再計画が必要
        next: fix_plan

      - condition: 監査継続不可
        next: ABORT

    output_contracts:
      report:
        - name: final-audit.md
          format: audit-report

loop_monitors:
  - cycle: [self_review, implementation, verification]
    threshold: 2
    judge:
      persona: supervisor
      instruction: |
        self_review / implementation / verification ループに進捗があるかを評価してください。
        進捗ありは、以前の blocking review finding が実際に解消された、
        回帰テストや検証で blocker severity が下がった、
        または誤った変更を除去してパッチが明確に改善した場合だけです。
        許容された untracked files、auto-staging の状態、報告文面だけの変化は進捗に含めません。
        手動E2Eや release gate だけが残っているなら implementation 継続ではなく進捗なしと判断してください。
      rules:
        - condition: "進捗あり"
          next: implementation
        - condition: "進捗なし"
          next: ABORT

  - cycle: [final_audit, audit_triage, implementation, verification, self_review]
    threshold: 2
    judge:
      persona: supervisor
      instruction: |
        final_audit から code remediation に戻るループに進捗があるかを評価してください。
        進捗ありは、以前の audit blocker が実際に解消された、
        blocker が code/docs/tests と manual release gate に明確に分離された、
        または新しい検証で blocker severity が明確に下がった場合だけです。
        同じ release-gate 項目、同じ docs/test 欠落、同じ stale finding が残るなら進捗なしです。
      rules:
        - condition: "進捗あり"
          next: audit_triage
        - condition: "進捗なし"
          next: ABORT

  - cycle: [final_audit, release_gate]
    threshold: 2
    judge:
      persona: supervisor
      instruction: |
        final_audit / release_gate ループに進捗があるかを評価してください。
        実際に E2E や手動ゲートが実行されたか、未検証項目が減ったか、
        あるいはコード欠陥として切り分けられたかで判断してください。
        同じ環境不足や同じ人手待ちが続くなら進捗なしです。
      rules:
        - condition: "進捗あり"
          next: release_gate
        - condition: "進捗なし"
          next: ABORT
