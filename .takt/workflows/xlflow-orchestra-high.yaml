name: xlflow-orchestra-high
description: GPT-5.4 planner/auditor + DeepSeek V4 Pro implementer/reviewer workflow

workflow_config:
  provider_options:
    codex:
      network_access: true

    opencode:
      network_access: true

report_formats:
  plan: ../facets/output-contracts/plan.md
  write-tests-report: ../facets/output-contracts/write-tests-report.md
  implementation-report: ../facets/output-contracts/implementation-report.md
  verification-report: ../facets/output-contracts/verification-report.md
  review-report: ../facets/output-contracts/review-report.md
  audit-triage-report: ../facets/output-contracts/audit-triage-report.md
  release-gate-report: ../facets/output-contracts/release-gate-report.md
  audit-report: ../facets/output-contracts/audit-report.md

max_steps: 40
initial_step: plan

steps:
  # =========================================================
  # PLAN
  # =========================================================
  - name: plan

    edit: false

    provider: codex
    model: gpt-5.4
    required_permission_mode: full

    provider_options:
      codex:
        reasoning_effort: high

    persona: planner

    knowledge:
      - architecture
      - coding-rules
      - invariants

    instruction: |
      Analyze the request carefully.

      Produce:
      - architecture plan
      - implementation strategy
      - affected files
      - invariants
      - migration concerns
      - testing strategy
      - risk analysis

      Important:
      - minimize breaking changes
      - preserve public APIs
      - maintain workbook compatibility
      - keep exports deterministic

    rules:
      - condition: 要件が明確で実装可能
        next: write_tests

      - condition: ユーザーが質問をしている（実装タスクではない）
        next: COMPLETE

      - condition: 要件が不明確、情報不足
        next: ABORT
        appendix: |
          確認事項:
          - {質問1}
          - {質問2}

    output_contracts:
      report:
        - name: plan.md
          format: plan

    quality_gates:
      - Report body only. Start directly with the required heading and do not include any meta commentary.
      - The generated report must start with `# タスク計画` and must not include preambles such as `The user wants me`, `Let me`, or `I need to`.
      - type: command
        name: sanitize-plan-report
        command: pwsh -File ./.takt/sanitize-report.ps1 -Path "{report_dir}/plan.md" -ExpectedHeading "# タスク計画"
        cwd: .
        timeout_ms: 60000

  # =========================================================
  # WRITE TESTS
  # =========================================================
  - name: write_tests

    edit: true

    provider: codex
    model: gpt-5.4

    provider_options:
      codex:
        reasoning_effort: medium

    persona: tester

    policy:
      - coding
      - testing

    knowledge:
      - architecture
      - unit-testing
      - e2e-testing
      - coding-rules
      - invariants

    required_permission_mode: edit

    instruction: |
      Write tests before implementation.

      Focus on:
      - public behavior
      - edge cases
      - regression prevention
      - backward compatibility

      Prefer:
      - deterministic tests
      - isolated tests
      - maintainable fixtures

      Do not:
      - rewrite unrelated tests
      - change architecture

    rules:
      - condition: テスト作成が完了した
        next: implementation

      - condition: テスト対象が未実装のためテスト作成をスキップする
        next: implementation

      - condition: テスト作成を進行できない
        next: ABORT

      - condition: ユーザーへの確認事項があるためユーザー入力が必要
        next: write_tests
        requires_user_input: true
        interactive_only: true

    output_contracts:
      report:
        - name: test-report.md
          format: write-tests-report

    quality_gates:
      - Report body only. Start directly with the required heading and do not include any meta commentary.
      - The generated report must start with `# テスト作成レポート` and must not include preambles such as `The user wants me`, `Let me`, or `I need to`.
      - type: command
        name: sanitize-write-tests-report
        command: pwsh -File ./.takt/sanitize-report.ps1 -Path "{report_dir}/test-report.md" -ExpectedHeading "# テスト作成レポート"
        cwd: .
        timeout_ms: 60000

  # =========================================================
  # IMPLEMENTATION
  # =========================================================
  - name: implementation

    edit: true

    provider: opencode
    model: opencode-go/mimo-v2.5-pro

    persona: implementer

    policy:
      - coding

    knowledge:
      - architecture
      - coding-rules
      - invariants

    required_permission_mode: edit

    instruction: |
      Implement exactly as specified in the plan.

      Constraints:
      - preserve public APIs
      - preserve workbook compatibility
      - keep exports deterministic
      - avoid unnecessary refactors
      - avoid unrelated changes

      Requirements:
      - follow existing architecture
      - maintain naming consistency
      - write maintainable code
      - minimize side effects
      - update docs/specs/changelog when the approved plan makes behavior or contracts user-visible

      After implementation:
      - run the targeted tests and verification commands from the plan
      - fix failures
      - ensure lint passes for the touched slice

    rules:
      - condition: 実装が完了した
        next: verification

      - condition: 設計の問題により再計画が必要
        next: plan

      - condition: 実装を継続できない
        next: ABORT

      - condition: ユーザー入力が必要
        next: implementation
        requires_user_input: true
        interactive_only: true

    output_contracts:
      report:
        - name: implementation-report.md
          format: implementation-report

    quality_gates:
      - Report body only. Start directly with the required heading and do not include any meta commentary.
      - The generated report must start with `# Implementation Report` and must not include preambles such as `The user wants me`, `Let me`, or `I need to`.
      - type: command
        name: sanitize-implementation-report
        command: pwsh -File ./.takt/sanitize-report.ps1 -Path "{report_dir}/implementation-report.md" -ExpectedHeading "# Implementation Report"
        cwd: .
        timeout_ms: 60000

  # =========================================================
  # VERIFICATION
  # =========================================================
  - name: verification

    edit: false

    provider: opencode
    model: opencode-go/mimo-v2.5-pro

    persona: tester

    policy:
      - testing

    knowledge:
      - unit-testing
      - e2e-testing
      - coding-rules
      - invariants

    required_permission_mode: full

    instruction: |
      Verify the latest implementation or fix before review.

      Validate:
      - targeted tests and verification commands for the touched slice ran
      - each addressed finding has concrete evidence in code, tests, docs, or command output
      - docs/spec/changelog updates stay aligned with behavior when they were part of scope
      - any remaining unverified items are explicit

      Prefer:
      - the cheapest discriminating checks first
      - focused verification before broader suites
      - explicit evidence over intent

    rules:
      - condition: 検証が通過した
        next: self_review

      - condition: コード修正が必要
        next: implementation

      - condition: コード修正は不要だが手動E2Eまたは環境依存の検証が必要
        next: release_gate

      - condition: 検証証跡の整理のみで再レビュー可能
        next: self_review

      - condition: 検証を継続できない
        next: ABORT

    output_contracts:
      report:
        - name: verification-report.md
          format: verification-report

    quality_gates:
      - Report body only. Start directly with the required heading and do not include any meta commentary.
      - The generated report must start with `# 検証レポート` and must not include preambles such as `The user wants me`, `Let me`, or `I need to`.
      - type: command
        name: sanitize-verification-report
        command: pwsh -File ./.takt/sanitize-report.ps1 -Path "{report_dir}/verification-report.md" -ExpectedHeading "# 検証レポート"
        cwd: .
        timeout_ms: 60000

  # =========================================================
  # SELF REVIEW
  # =========================================================
  - name: self_review
    persona: reviewer

    edit: false

    provider: opencode
    model: opencode-go/mimo-v2.5-pro

    knowledge:
      - architecture
      - coding-rules
      - invariants
      - security

    instruction: |
      Critically review the implementation.

      Find:
      - hidden bugs
      - edge cases
      - regression risks
      - architecture violations
      - maintainability issues
      - naming inconsistencies
      - dead code
      - unnecessary complexity

      Validate:
      - tests are meaningful
      - implementation matches the plan or audit triage
      - no unrelated files changed
      - intentional new files within scope are acceptable even if currently untracked
      - auto-staging or transient git state is not treated as a blocker by itself

      Be strict and skeptical.

    rules:
      - condition: 修正が必要
        next: fix

      - condition: 実装品質が十分
        next: sanitize_reports

      - condition: レビュー継続不可
        next: ABORT

    output_contracts:
      report:
        - name: self-review.md
          format: review-report

    quality_gates:
      - Report body only. Start directly with the required heading and do not include any meta commentary.
      - The generated report must start with `# Review Report` and must not include preambles such as `The user wants me`, `Let me`, or `I need to`.
      - type: command
        name: sanitize-self-review-report
        command: pwsh -File ./.takt/sanitize-report.ps1 -Path "{report_dir}/self-review.md" -ExpectedHeading "# Review Report"
        cwd: .
        timeout_ms: 60000

  # =========================================================
  # FIX
  # =========================================================
  - name: fix

    edit: true

    provider: opencode
    model: opencode-go/mimo-v2.5-pro

    persona: implementer

    policy:
      - coding
      - testing

    knowledge:
      - architecture
      - coding-rules
      - invariants

    required_permission_mode: edit

    instruction: |
      Address the concrete findings from self_review with the smallest safe patch.

      Requirements:
      - fix blocker or medium-severity review findings before cosmetic ones
      - keep the scope tightly limited to the reported defects
      - add or adjust regression tests when a review finding exposes a missing proof
      - preserve public APIs, workbook compatibility, and deterministic exports
      - do not invent edits for allowed untracked files or auto-staging observations

      After changes:
      - run only the relevant tests or verification commands
      - confirm each addressed finding has concrete evidence in code or test output
      - if no actionable code/doc/test change remains, keep the code unchanged and let verification capture that evidence

      Avoid:
      - restarting broad implementation work
      - unrelated refactors or cleanup
      - repeating the same failed approach without new evidence

    rules:
      - condition: 修正が完了した
        next: verification

      - condition: 再計画が必要
        next: plan

      - condition: 修正を継続できない
        next: ABORT

      - condition: ユーザー入力が必要
        next: fix
        requires_user_input: true
        interactive_only: true

    output_contracts:
      report:
        - name: fix-report.md
          format: implementation-report

    quality_gates:
      - Report body only. Start directly with the required heading and do not include any meta commentary.
      - The generated report must start with `# Implementation Report` and must not include preambles such as `The user wants me`, `Let me`, or `I need to`.
      - type: command
        name: sanitize-fix-report
        command: pwsh -File ./.takt/sanitize-report.ps1 -Path "{report_dir}/fix-report.md" -ExpectedHeading "# Implementation Report"
        cwd: .
        timeout_ms: 60000

  # =========================================================
  # AUDIT TRIAGE
  # =========================================================
  - name: audit_triage

    edit: false

    provider: codex
    model: gpt-5.4
    required_permission_mode: full

    provider_options:
      codex:
        reasoning_effort: medium

    persona: planner

    knowledge:
      - architecture
      - coding-rules
      - invariants
      - maintainability

    instruction: |
      Turn final_audit feedback into the smallest safe next action.

      Separate findings into:
      - actionable code/docs/tests changes
      - manual or Windows + Excel release-gate and E2E verification
      - non-blocking or already-fixed notes that should not reopen implementation

      Requirements:
      - send work back to implementation only when concrete file edits remain
      - route pure release-gate or environment-proof items to release_gate
      - do not reopen implementation for allowed untracked files, auto-staging concerns, or stale already-fixed findings
      - if the findings imply a deeper design problem, re-plan instead of churning

      Produce:
      - exact files or commands
      - verification evidence needed
      - any user or environment dependency

    rules:
      - condition: コード/ドキュメント/テスト修正計画が確定した
        next: implementation

      - condition: 手動E2Eまたはリリースゲート確認が必要
        next: release_gate

      - condition: 設計見直しが必要
        next: plan

      - condition: 監査所見の整理により再監査で足りる
        next: sanitize_reports

      - condition: ユーザー判断が必要
        next: audit_triage
        requires_user_input: true
        interactive_only: true

      - condition: 判断を継続できない
        next: ABORT

    output_contracts:
      report:
        - name: audit-triage.md
          format: audit-triage-report

    quality_gates:
      - Report body only. Start directly with the required heading and do not include any meta commentary.
      - The generated report must start with `# タスク計画` and must not include preambles such as `The user wants me`, `Let me`, or `I need to`.
      - type: command
        name: sanitize-audit-triage-report
        command: pwsh -File ./.takt/sanitize-report.ps1 -Path "{report_dir}/audit-triage.md" -ExpectedHeading "# タスク計画"
        cwd: .
        timeout_ms: 60000

  # =========================================================
  # RELEASE GATE
  # =========================================================
  - name: release_gate

    edit: true

    provider: codex
    model: gpt-5.4
    required_permission_mode: full

    provider_options:
      codex:
        reasoning_effort: medium

    persona: tester

    policy:
      - testing

    knowledge:
      - e2e-testing
      - architecture
      - coding-rules
      - invariants

    instruction: |
      Resolve remaining manual or environment-bound audit blockers without reopening broad implementation by default.

      Focus on:
      - Windows + Excel COM E2E and other release-gate proof
      - docs or contract evidence that does not require new code edits
      - clearly separating verified blockers from environment limitations

      Requirements:
      - run the narrowest release-gate checks that answer the remaining blocker
      - if the gate exposes a concrete defect, hand it back through audit_triage with the exact failure
      - if the gate is blocked by environment or human-only work, stop cleanly with explicit handoff instead of looping
      - do not treat allowed untracked files or auto-staging state as gate failures

    rules:
      - condition: 検証が完了し再監査に進める
        next: sanitize_reports

      - condition: 実装修正が必要と判明した
        next: audit_triage

      - condition: 設計見直しが必要
        next: plan

      - condition: ユーザーまたは別環境での確認が必要
        next: ABORT
        appendix: |
          release_gate handoff:
          - remaining gate: {残件}
          - recommended command or environment: {推奨手順}
          - blocking reason: {阻害要因}

      - condition: 検証を継続できない
        next: ABORT

    output_contracts:
      report:
        - name: release-gate-report.md
          format: release-gate-report

    quality_gates:
      - Report body only. Start directly with the required heading and do not include any meta commentary.
      - The generated report must start with `# Release Gate Report` and must not include preambles such as `The user wants me`, `Let me`, or `I need to`.
      - type: command
        name: sanitize-release-gate-report
        command: pwsh -File ./.takt/sanitize-report.ps1 -Path "{report_dir}/release-gate-report.md" -ExpectedHeading "# Release Gate Report"
        cwd: .
        timeout_ms: 60000

  # =========================================================
  # SANITIZE REPORTS
  # =========================================================
  - name: sanitize_reports

    edit: true

    provider: codex
    model: gpt-5.4
    required_permission_mode: edit

    provider_options:
      codex:
        reasoning_effort: low

    persona: tester

    instruction: |
      Normalize workflow report files only.

      Scope:
      - {report_dir}/plan.md
      - {report_dir}/test-report.md
      - {report_dir}/implementation-report.md
      - {report_dir}/verification-report.md
      - {report_dir}/self-review.md
      - {report_dir}/fix-report.md
      - {report_dir}/audit-triage.md
      - {report_dir}/release-gate-report.md

      Requirements:
      - do not edit source code
      - do not change report meaning
      - remove conversational preambles, accidental dialogue logs, and stray markdown fences before the required heading
      - preserve findings, evidence, commands, results, and unresolved items
      - if a file does not exist, ignore it
      - if a report is too corrupted to repair confidently, say so in the sanitize report and continue

      Use `pwsh -File ./.takt/sanitize-report.ps1` for each report file.

    rules:
      - condition: レポート整形が完了した
        next: final_audit

      - condition: レポート整形を継続できない
        next: final_audit

    output_contracts:
      report:
        - name: report-sanitize.md
          format: |
            # Report Sanitize Report

            ## Summary

            ## Files Normalized

            ## Files Skipped

            ## Remaining Concerns

    quality_gates:
      - Report body only. Start directly with the required heading and do not include any meta commentary.
      - The generated report must start with `# Report Sanitize Report` and must not include preambles such as `The user wants me`, `Let me`, or `I need to`.
      - type: command
        name: sanitize-sanitize-report
        command: pwsh -File ./.takt/sanitize-report.ps1 -Path "{report_dir}/report-sanitize.md" -ExpectedHeading "# Report Sanitize Report"
        cwd: .
        timeout_ms: 60000

  # =========================================================
  # FINAL AUDIT
  # =========================================================
  - name: final_audit

    edit: true

    provider: codex
    model: gpt-5.4
    required_permission_mode: full

    provider_options:
      codex:
        reasoning_effort: medium

    persona: architect

    knowledge:
      - architecture
      - coding-rules
      - invariants
      - maintainability
      - security

    instruction: |
      Perform final architecture and quality audit.

      Important workflow policy:
      - Do not reject or reopen implementation solely because a prior report contains conversational preamble, markdown fences, heading mismatch, or dialogue-log contamination.
      - Treat report-format problems as workflow hygiene issues, not implementation defects.
      - If report contamination makes evidence awkward but the code, diff, tests, or commands remain understandable, record it as a non-blocking hygiene note.
      - Prefer direct evidence from source files, diffs, tests, and commands over prior report wording.
      - Only route to audit_triage when concrete code, docs, or tests changes are required.
      - Only route to release_gate when manual or environment-bound verification is required.

      Validate:
      - architecture consistency
      - long-term maintainability
      - hidden coupling
      - regression risks
      - extensibility
      - correctness of abstractions
      - compatibility guarantees
      - actionable code/docs/tests blockers are separated from manual release-gate blockers
      - report verdicts are internally consistent with the findings they cite

      Check carefully for:
      - subtle design flaws
      - future maintenance hazards
      - specification drift
      - accidental complexity
      - stale findings that are already fixed
      - workflow-policy mismatches such as allowed untracked files or auto-staging being reported as blockers

      Prefer:
      - simplicity
      - explicitness
      - stable interfaces
      - approval when only non-blocking notes remain

    rules:
      - condition: 承認
        next: COMPLETE

      - condition: コード/ドキュメント/テスト修正が必要
        next: audit_triage

      - condition: 手動E2Eまたはリリースゲート確認が必要
        next: release_gate

      - condition: 設計見直しが必要
        next: plan

      - condition: 監査継続不可
        next: ABORT

    output_contracts:
      report:
        - name: final-audit.md
          format: audit-report

    quality_gates:
      - Report body only. Start directly with the required heading and do not include any meta commentary.
      - The generated report must start with `# Final Audit Report` and must not include preambles such as `The user wants me`, `Let me`, or `I need to`.
      - type: command
        name: sanitize-final-audit-report
        command: pwsh -File ./.takt/sanitize-report.ps1 -Path "{report_dir}/final-audit.md" -ExpectedHeading "# Final Audit Report"
        cwd: .
        timeout_ms: 60000

loop_monitors:
  - cycle: [self_review, fix, verification]
    threshold: 2
    judge:
      persona: supervisor
      instruction: |
        self_review / fix / verification ループに進捗があるかを評価してください。
        進捗ありと見なせるのは、以前の blocking review finding が解消された、
        追加の回帰テストや検証で blocker severity が下がった、
        または誤った変更を除去してパッチが明確に改善した場合だけです。
        許容された untracked files、auto-staging の状態、報告文面だけの変化は進捗に含めません。
        手動E2Eや release gate だけが残っているなら fix 継続ではなく進捗なしと判断してください。
      rules:
        - condition: "進捗あり"
          next: fix
        - condition: "進捗なし"
          next: ABORT

  - cycle: [final_audit, audit_triage, implementation, verification, self_review, sanitize_reports]
    threshold: 2
    judge:
      persona: supervisor
      instruction: |
        final_audit から code remediation に戻るループに進捗があるかを評価してください。
        進捗ありは、以前の audit blocker のうち少なくとも 1 件が実際に解消された、
        blocker 集合が縮小した、
        blocker が code/docs/tests と manual release gate により正確に分離された、
        または新しい検証で残件の severity や範囲が明確に下がった場合です。
        release-gate blocker だけ先に解消され、code/docs/tests blocker がより狭い形で残る場合も進捗ありです。
        同じ blocker 集合が実質不変で、報告文面や言い換えだけが変わった場合は進捗なしです。
      rules:
        - condition: "進捗あり"
          next: audit_triage
        - condition: "進捗なし"
          next: ABORT

  - cycle: [final_audit, release_gate, sanitize_reports]
    threshold: 2
    judge:
      persona: supervisor
      instruction: |
        final_audit / release_gate ループに進捗があるかを評価してください。
        実際に E2E や手動ゲートが実行されたか、未検証項目が減ったか、
        あるいはコード欠陥として切り分けられたかで判断してください。
        同じ環境不足や同じ人手待ちが続くなら進捗なしです。
      rules:
        - condition: "進捗あり"
          next: release_gate
        - condition: "進捗なし"
          next: ABORT
