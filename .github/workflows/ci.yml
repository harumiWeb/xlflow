name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -Repository PSGallery
      - name: Run PowerShell lint
        shell: pwsh
        run: .\scripts\dev\lint-powershell.ps1

  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./...
      - run: go vet ./...

  security:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install govulncheck
        shell: pwsh
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        shell: pwsh
        run: |
          $govulncheck = Join-Path (go env GOPATH) "bin\govulncheck.exe"
          & $govulncheck ./...
      - name: Check third-party licence inventory
        shell: pwsh
        run: .\scripts\dev\check-third-party-licences.ps1
