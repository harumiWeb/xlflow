name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      run_ci: ${{ steps.detect.outputs.run_ci }}
      changed_files: ${{ steps.detect.outputs.changed_files }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Detect markdown-only changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_ref="origin/${{ github.base_ref }}"
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            changed_files="$(git diff --name-only "$base_ref...HEAD")"
          else
            before_sha="${{ github.event.before }}"
            if [[ -z "$before_sha" || "$before_sha" == "0000000000000000000000000000000000000000" ]]; then
              echo "run_ci=true" >> "$GITHUB_OUTPUT"
              echo "changed_files=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            changed_files="$(git diff --name-only "$before_sha...${{ github.sha }}")"
          fi

          {
            echo "changed_files<<EOF"
            printf '%s\n' "$changed_files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          run_ci=false
          while IFS= read -r path; do
            [[ -z "$path" ]] && continue
            if [[ "$path" != *.md ]]; then
              run_ci=true
              break
            fi
          done <<< "$changed_files"

          echo "run_ci=$run_ci" >> "$GITHUB_OUTPUT"

  lint:
    needs: changes
    if: needs.changes.outputs.run_ci == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -Repository PSGallery
      - name: Run PowerShell lint
        shell: pwsh
        run: .\scripts\dev\lint-powershell.ps1

  test:
    needs: changes
    if: needs.changes.outputs.run_ci == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - run: go test ./...
      - run: dotnet test bridge/dotnet/tests/Xlflow.ExcelBridge.Tests/Xlflow.ExcelBridge.Tests.csproj
      - run: go vet ./...

  security:
    needs: changes
    if: needs.changes.outputs.run_ci == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install govulncheck
        shell: pwsh
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          $gobin = go env GOBIN
          if ([string]::IsNullOrWhiteSpace($gobin)) {
            $gopath = (go env GOPATH).Split([System.IO.Path]::PathSeparator)[0]
            $gobin = Join-Path $gopath "bin"
          }
          $gobin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Run govulncheck
        shell: pwsh
        run: govulncheck ./...
      - name: Check third-party licence inventory
        shell: pwsh
        run: .\scripts\dev\check-third-party-licences.ps1
