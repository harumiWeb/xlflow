name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -Repository PSGallery
      - name: Run PowerShell lint
        shell: pwsh
        run: .\scripts\dev\lint-powershell.ps1

  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - run: go test ./...
      - run: dotnet test bridge/dotnet/tests/Xlflow.ExcelBridge.Tests/Xlflow.ExcelBridge.Tests.csproj
      - run: go vet ./...

  security:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install govulncheck
        shell: pwsh
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          $gobin = go env GOBIN
          if ([string]::IsNullOrWhiteSpace($gobin)) {
            $gopath = (go env GOPATH).Split([System.IO.Path]::PathSeparator)[0]
            $gobin = Join-Path $gopath "bin"
          }
          $gobin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Run govulncheck
        shell: pwsh
        run: govulncheck ./...
      - name: Check third-party licence inventory
        shell: pwsh
        run: .\scripts\dev\check-third-party-licences.ps1
