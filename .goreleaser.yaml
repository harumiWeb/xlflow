version: 2

project_name: xlflow

before:
  hooks:
    - go mod tidy

builds:
  - id: xlflow
    main: ./cmd/xlflow
    binary: xlflow
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}
    goos:
      - windows
    goarch:
      - amd64
    hooks:
      pre:
        - cmd: >-
            pwsh -NoProfile -File ./scripts/build-dotnet-bridge.ps1
            -Runtime win-x64
            -OutputDir ./bridge/dotnet/artifacts/publish/win-x64
          output: true
  - id: xlflow-linux
    main: ./cmd/xlflow
    binary: xlflow
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}
    goos:
      - linux
    goarch:
      - amd64

archives:
  - id: xlflow-windows
    ids:
      - xlflow
    formats:
      - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md
      - src: bridge/dotnet/artifacts/publish/{{ if eq .Os "windows" }}win-x64{{ else }}missing{{ end }}/xlflow-excel-bridge.exe
        strip_parent: true
  - id: xlflow-linux
    ids:
      - xlflow-linux
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

sboms:
  - id: archives
    artifacts: archive
    disable: false

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

scoops:
  - name: xlflow
    commit_msg_template: "Scoop update for {{ .ProjectName }} version {{ .Tag }}"
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com
    repository:
      owner: harumiWeb
      name: scoop-bucket
      branch: main
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    directory: bucket
    homepage: https://github.com/harumiWeb/xlflow
    description: Excel VBA development framework for CLI-first humans and AI agents.
    license: MIT

winget:
  - name: xlflow
    publisher: HarumiWeb
    package_identifier: HarumiWeb.Xlflow
    package_name: xlflow
    short_description: Excel VBA development framework for CLI-first humans and AI agents.
    description: Excel VBA development framework for CLI-first humans and AI agents.
    license: MIT
    homepage: https://github.com/harumiWeb/xlflow
    publisher_url: https://github.com/harumiWeb
    publisher_support_url: https://github.com/harumiWeb/xlflow/issues
    license_url: https://github.com/harumiWeb/xlflow/blob/{{ .Tag }}/LICENSE
    tags:
      - go
      - cli
      - excel
      - vba
      - automation
    ids:
      - xlflow-windows
    repository:
      owner: harumiWeb
      name: winget-pkgs
      branch: xlflow-{{ .Version }}
      token: "{{ .Env.WINGET_GITHUB_TOKEN }}"
      pull_request:
        enabled: false
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master
    commit_msg_template: "{{ .PackageIdentifier }}: {{ .Tag }}"
    skip_upload: "{{ if .Prerelease }}true{{ else }}false{{ end }}"
