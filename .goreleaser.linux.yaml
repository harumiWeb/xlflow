version: 2

project_name: xlflow

before:
  hooks:
    - go mod download
    - go mod verify

builds:
  - id: xlflow-linux
    main: ./cmd/xlflow
    binary: xlflow
    env:
      - CGO_ENABLED=1
      - CC=gcc
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}
    goos:
      - linux
    goarch:
      - amd64

archives:
  - id: xlflow-linux
    ids:
      - xlflow-linux
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums-linux.txt
  algorithm: sha256

sboms:
  - id: archives
    artifacts: archive
    disable: false

snapshot:
  version_template: "{{ incpatch .Version }}-next"
